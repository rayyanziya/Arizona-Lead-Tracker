server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: every non-file route falls back to index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service. The /api prefix is stripped so the
    # backend sees /auth/login, /leads, etc. (matches the Vite dev proxy rewrite).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}