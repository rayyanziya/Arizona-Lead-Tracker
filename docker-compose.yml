name: arizona-lead-tracker

# Shared backend env (all Python services read the same .env)
x-backend-env: &backend-env
  env_file: [.env]

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alt_password}
      POSTGRES_DB: ${POSTGRES_DB:-arizona_lead_tracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alt} -d ${POSTGRES_DB:-arizona_lead_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: *backend-build
    <<: *backend-env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app

  # Lightweight worker: Reddit + X (API) collection, the shared pipeline, and
  # notifications. X uses the official API (no browser), so it lives here.
  worker:
    build: *backend-build
    <<: *backend-env
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q reddit,x,pipeline,notify --concurrency=4
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app

  # Heavy worker: Playwright (Facebook only). Low concurrency, isolated so a
  # blocked browser never starves Reddit/X collection or notification delivery.
  worker-browser:
    build:
      context: ./backend
      dockerfile: Dockerfile.browser
    <<: *backend-env
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q browser --concurrency=1 --pool=solo
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      # /app/.sessions resolves to host ./backend/.sessions (via the ./backend:/app
      # mount, no named volume shadowing it), so a session captured on the host with
      # `python -m scripts.capture_fb_session --session-dir ./backend/.sessions` is
      # readable here. Encrypted at rest (Fernet), so the bind mount is safe.
      - ./backend:/app
    shm_size: "1gb"

  beat:
    build: *backend-build
    <<: *backend-env
    command: celery -A app.tasks.celery_app beat --loglevel=info
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app

  # Dashboard SPA. nginx serves the built bundle and proxies /api -> api:8000,
  # so the browser only talks to this one origin (8080).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  # Local email sink (SMTP on 1025, web UI on 8025). Swap for real SMTP in prod.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redisdata:
